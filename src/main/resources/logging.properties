# Standard Java Utility Logging configuration
# This file prevents MockServer from injecting its own handlers that cause ClassNotFoundException in Fat JARs

# Use only standard JUL handlers
handlers=java.util.logging.ConsoleHandler

# Default global logging level
.level=OFF

# Default ConsoleHandler properties
java.util.logging.ConsoleHandler.level=OFF
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=[%1$tF %1$tT.%1$tL] [%4$-7s] %2$s - %5$s %6$s%n
